<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - YT Stats API</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF0000;
            --bg: #0F0F0F;
            --card-bg: #1A1A1A;
            --text: #FFFFFF;
            --text-dim: #B0B0B0;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-card {
            background: var(--card-bg);
            padding: 50px;
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, #FF0000, #FF7675);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: var(--text-dim);
            margin-bottom: 40px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            margin-bottom: 20px;
            border: none;
            cursor: pointer;
            font-size: 1rem;
        }

        .btn-google {
            background: white;
            color: #333;
        }

        .btn-google:hover {
            background: #f1f1f1;
            transform: translateY(-3px);
        }

        .divider {
            margin: 30px 0;
            display: flex;
            align-items: center;
            color: var(--text-dim);
            font-size: 0.8rem;
        }

        .divider::before, .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: var(--glass-border);
            margin: 0 15px;
        }

        .admin-login {
            text-align: left;
        }

        .admin-login label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        input {
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            background: #252525;
            border: 1px solid var(--glass-border);
            color: white;
            margin-bottom: 20px;
            outline: none;
        }

        .btn-admin {
            background: var(--primary);
            color: white;
        }

        .btn-admin:hover {
            background: #E60000;
        }

        .flash {
            background: rgba(231, 76, 60, 0.1);
            color: #e74c3c;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h1>Welcome Back</h1>
        <p>Login to manage your channel stats</p>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="flash">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <a href="{{ url_for('google.login') }}" class="btn btn-google">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="20" alt="Google">
            Sign in with Google
        </a>

        <div class="divider">ADMIN ACCESS</div>

        <form action="{{ url_for('login_admin') }}" method="POST" class="admin-login">
            <label>Admin Password</label>
            <input type="password" name="password" placeholder="Enter admin password" required>
            <button type="submit" class="btn btn-admin">Login as Admin</button>
        </form>

        <a href="/" style="color: var(--text-dim); text-decoration: none; font-size: 0.8rem; margin-top: 20px; display: block;">&larr; Back to Home</a>
    </div>

</body>
</html>
